<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Emulator</title>

<style>
html,body{
margin:0;
background:black;
height:100%;
overflow:hidden;
font-family:sans-serif;
}

#game{
width:100vw;
height:100dvh;
background:black;
}

#menu{
position:fixed;
top:10px;
left:10px;
z-index:999;
display:flex;
gap:5px;
opacity:.3;
transition:.2s;
}

#menu:hover{
opacity:1;
}

button{
border:none;
padding:8px;
background:#222;
color:white;
border-radius:8px;
font-size:14px;
cursor:pointer;
}

#rom,#sav{
display:none;
}
</style>
</head>

<body>

<div id="menu">
<button onclick="rom.click()">ROM</button>
<button onclick="sav.click()">SAV</button>
<button onclick="fullscreen()">FULL</button>
</div>

<input id="rom" type="file" accept=".gb,.gbc,.gba,.smc,.sfc">
<input id="sav" type="file" accept=".sav,.srm">

<div id="game"></div>

<script>
const rom = document.getElementById("rom");
const sav = document.getElementById("sav");

let blobUrl = null;
let emulatorLoaded = false;

function setCore(name){
    name = name.toLowerCase();

    if(name.endsWith(".gba")){
        window.EJS_core = "mgba";
        return "gba";
    }

    if(name.endsWith(".gb") || name.endsWith(".gbc")){
        window.EJS_core = "gb";
        return "gb";
    }

    if(name.endsWith(".smc") || name.endsWith(".sfc")){
        window.EJS_core = "snes";
        return "snes";
    }

    return null;
}

function clean(){

    const old = document.getElementById("emulatorjs");
    if(old) old.remove();

    document.getElementById("game").innerHTML = "";

    if(blobUrl){
        URL.revokeObjectURL(blobUrl);
        blobUrl = null;
    }

    window.EJS_emulator = null;
    window.EJS_gameUrl = null;
    window.EJS_player = null;
}

function load(file){
    if(!file) return;

    clean();

    const type = setCore(file.name);

    if(!type){
        alert("Unsupported ROM");
        return;
    }

    const reader = new FileReader();

    reader.onload = () => {

        blobUrl = URL.createObjectURL(
            new Blob([reader.result])
        );

        window.EJS_player = "#game";
        window.EJS_gameUrl = blobUrl;
        window.EJS_gameName = file.name;
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        window.EJS_startOnLoaded = true;

        // IMPORTANT: only allow ONE loader instance
        const oldScript = document.getElementById("emulatorjs");
        if(oldScript) oldScript.remove();

        const script = document.createElement("script");
        script.id = "emulatorjs";
        script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";

        script.onerror = () => {
            alert("Failed to load EmulatorJS");
        };

        document.body.appendChild(script);
    };

    reader.readAsArrayBuffer(file);
}

// ROM load
rom.onchange = e => load(e.target.files[0]);

// drag & drop
document.body.ondragover = e => e.preventDefault();
document.body.ondrop = e => {
    e.preventDefault();
    load(e.dataTransfer.files[0]);
};

// fullscreen
function fullscreen(){
    document.getElementById("game").requestFullscreen();
}
</script>

</body>
</html>
