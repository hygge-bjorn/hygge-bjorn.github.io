<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Emulator</title>

<link rel="preconnect" href="https://cdn.emulatorjs.org">
<link rel="dns-prefetch" href="https://cdn.emulatorjs.org">

<style>
html,body{
margin:0;
background:black;
overflow:hidden;
height:100%;
}

#game{
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:black;
}

#rom,#sav{
display:none;
}

#menu{
position:fixed;
top:10px;
left:10px;
z-index:999;
display:flex;
gap:5px;
opacity:.2;
transition:.2s;
}

#menu:hover{
opacity:1;
}

button{
border:none;
padding:8px;
background:#222;
color:white;
border-radius:8px;
font-size:14px;
}
</style>
</head>
<body>

<div id="menu">
<button onclick="rom.click()">ROM</button>
<button onclick="sav.click()">SAV</button>
<button onclick="downloadSav()">↓SAV</button>
<button onclick="fullscreen()">FULL</button>
</div>

<input id="rom" type="file" accept=".gb,.gbc,.gba">
<input id="sav" type="file" accept=".sav">

<div id="game"></div>

<script>
window.EJS_disableDatabases = true;

const rom = document.getElementById("rom");
const sav = document.getElementById("sav");

let game = "";
let loading = false;
let blobUrl = null;

function core(name){

name = name.toLowerCase();

if(name.endsWith(".gba")) return "gba";
if(name.endsWith(".gb")) return "gb";
if(name.endsWith(".gbc")) return "gb";

return null;
}

function clean(){

try{

const old =
document.getElementById("ejs");

if(old) old.remove();

document.getElementById("game")
.innerHTML = "";

if(blobUrl){

URL.revokeObjectURL(blobUrl);

blobUrl = null;
}

}catch(e){}
}

function load(file){

if(loading) return;

if(!file) return;

const c = core(file.name);

if(!c){

alert("Unsupported ROM");

return;
}

loading = true;

game = file.name;

clean();

const r = new FileReader();

r.onerror = ()=>{

loading = false;

alert("ROM read failed");
};

r.onload = ()=>{

try{

blobUrl =
URL.createObjectURL(
new Blob([r.result])
);

window.EJS_player = "#game";

window.EJS_gameUrl =
blobUrl;

window.EJS_core = c;

window.EJS_gameName =
game;

window.EJS_pathtodata =
"https://cdn.emulatorjs.org/stable/data/";

window.EJS_startOnLoaded =
true;

window.EJS_onSaveSRAM =
data=>{

const sr = new FileReader();

sr.onload = ()=>{

try{

localStorage.setItem(
game + ".sav",
sr.result.split(",")[1]
);

}catch(e){}
};

sr.readAsDataURL(data);
};

const existing =
localStorage.getItem(
game + ".sav"
);

if(existing){

try{

const bytes =
Uint8Array.from(
atob(existing),
c=>c.charCodeAt(0)
);

window.EJS_loadStateURL =
URL.createObjectURL(
new Blob([bytes])
);

}catch(e){}
}

const s =
document.createElement("script");

s.id = "ejs";

s.src =
"https://cdn.emulatorjs.org/stable/data/loader.min.js?v="
+ Date.now();

s.onload = ()=>{

loading = false;
};

s.onerror = ()=>{

loading = false;

alert("Core load failed");
};

document.body.appendChild(s);

}catch(e){

loading = false;

alert("Emulator crashed");
}
};

r.readAsArrayBuffer(file);
}

rom.onchange =
e=>load(e.target.files[0]);

document.body.ondragover =
e=>e.preventDefault();

document.body.ondrop = e=>{

e.preventDefault();

load(
e.dataTransfer.files[0]
);
};

sav.onchange = ()=>{

if(!game){

alert("Load ROM first");

return;
}

const f = sav.files[0];

if(!f) return;

const r = new FileReader();

r.onload = ()=>{

try{

localStorage.setItem(
game + ".sav",
r.result.split(",")[1]
);

alert(
"Save uploaded. Reload ROM."
);

}catch(e){

alert("Bad save");
}
};

r.readAsDataURL(f);
};

function downloadSav(){

if(!game){

alert("No game");

return;
}

const data =
localStorage.getItem(
game + ".sav"
);

if(!data){

alert("No save");

return;
}

const a =
document.createElement("a");

a.href =
"data:application/octet-stream;base64,"
+ data;

a.download =
game + ".sav";

a.click();
}

function fullscreen(){

const g =
document.getElementById("game");

if(g.requestFullscreen)
g.requestFullscreen();
}

window.onerror = ()=>true;

window.onunhandledrejection =
()=>true;
</script>

</body>
</html>
