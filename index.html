<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bear Emulator</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    background:white;
}

#game{
    width:800px;
    height:600px;
    margin:auto;
    background:black;
    border:4px solid black;
}

button,input{
    margin:5px;
}

</style>
</head>
<body>

<img
src="https://media.tenor.com/qybTL4kI0CIAAAAC/dancing-bear.gif"
width="150">

<h2>Bear Emulator</h2>

<input
type="file"
id="romUpload"
accept=".gba,.gb,.gbc">

<br>

<button onclick="downloadSav()">
Download .sav
</button>

<input
type="file"
id="savUpload"
accept=".sav">

<br>

<button onclick="downloadState()">
Download .state
</button>

<input
type="file"
id="stateUpload"
accept=".state">

<br><br>

<div id="game"></div>

<script src="script.js"></script>

</body>
</html>
