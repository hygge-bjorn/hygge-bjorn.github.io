<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Huggy Bjorn Emulator</title>

<style>

body{
    background:white;
    color:black;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding:20px;
}

img{
    margin-bottom:10px;
}

#game{
    width:800px;
    height:600px;
    margin:auto;
    background:black;
    border:4px solid black;
}

button,
input{
    margin:5px;
    padding:5px;
}

#controls{
    margin-top:10px;
    font-size:14px;
}

</style>
</head>
<body>

<img
src="https://media.tenor.com/qybTL4kI0CIAAAAC/dancing-bear.gif"
width="150"
alt="Dancing Bear">

<h2>Huggy Bjorn Emulator</h2>

<input
type="file"
id="romUpload"
accept=".gba,.gb,.gbc">

<br>

<button id="downloadSaveBtn">
Download .sav
</button>

<input
type="file"
id="savUpload"
accept=".sav">

<div id="controls">

Z = A |
X = B |
ENTER = START |
SHIFT = SELECT |
ARROWS = MOVE

</div>

<br>

<div id="game"></div>

<script src="script.js"></script>

</body>
</html>
