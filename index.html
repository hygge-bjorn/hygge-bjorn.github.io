<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retro Emulator</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
}

#topbar{
    margin:20px;
}

#game{
    width: min(95vw, 900px);
    height: 70vh;
    margin:auto;
    border:4px solid white;
    background:black;
}

button,input{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    cursor:pointer;
}

#dropzone{
    width:min(90vw,500px);
    margin:20px auto;
    padding:25px;
    border:3px dashed #888;
    border-radius:12px;
}

.small{
    color:#aaa;
    font-size:14px;
}
</style>
</head>
<body>

<h1>Retro Emulator</h1>

<div id="topbar">
    <input type="file" id="romInput" accept=".gb,.gbc,.gba">
</div>

<div id="dropzone">
    Drag & Drop ROM Here
    <div class="small">
        Supports GB / GBC / GBA
    </div>
</div>

<div id="game"></div>

<script>
const romInput = document.getElementById("romInput");
const dropzone = document.getElementById("dropzone");

function getCore(filename){
    const lower = filename.toLowerCase();

    if(lower.endsWith(".gba")) return "gba";
    if(lower.endsWith(".gb")) return "gb";
    if(lower.endsWith(".gbc")) return "gb";

    return null;
}

function startEmulator(file){

    const core = getCore(file.name);

    if(!core){
        alert("Unsupported ROM type");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(){

        const romBlob = new Blob([reader.result]);

        // remove old emulator if one exists
        document.getElementById("game").innerHTML = "";

        // EmulatorJS config
        window.EJS_player = "#game";

        // ROM file
        window.EJS_gameUrl = URL.createObjectURL(romBlob);

        // Core type
        window.EJS_core = core;

        // Game name
        window.EJS_gameName = file.name;

        // EmulatorJS CDN paths
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

        // Saves enabled
        window.EJS_startOnLoaded = true;

        // Remove previous loader if needed
        const oldScript = document.getElementById("ejsloader");
        if(oldScript) oldScript.remove();

        // Load EmulatorJS
        const script = document.createElement("script");
        script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
        script.id = "ejsloader";

        document.body.appendChild(script);
    };

    reader.readAsArrayBuffer(file);
}

// File picker
romInput.addEventListener("change", (e)=>{
    const file = e.target.files[0];
    if(file) startEmulator(file);
});

// Drag/drop
dropzone.addEventListener("dragover", (e)=>{
    e.preventDefault();
});

dropzone.addEventListener("drop", (e)=>{
    e.preventDefault();

    const file = e.dataTransfer.files[0];

    if(file){
        startEmulator(file);
    }
});
</script>

</body>
</html>
