<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GBC Emulator</title>

<style>
html,body{
margin:0;
height:100%;
background:black;
overflow:hidden;
}

#game{
width:100vw;
height:100vh;
background:black;
}

#ui{
position:fixed;
top:10px;
left:10px;
z-index:10;
}

button{
padding:10px;
background:#222;
color:white;
border:none;
border-radius:8px;
}

#rom{display:none;}
</style>
</head>

<body>

<div id="ui">
<button onclick="document.getElementById('rom').click()">Load ROM</button>
</div>

<input id="rom" type="file" accept=".gb,.gbc">

<div id="game"></div>

<script src="emulator.js"></script>

</body>
</html>
