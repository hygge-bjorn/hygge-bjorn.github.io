<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Retro Emulator Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Retro Emulator Hub</h1>

  <input type="file" id="romInput" accept=".gb,.gbc,.gba,.nds" />

  <div id="dropZone">
    Drop ROM here
  </div>

  <div id="screen"></div>

  <!-- EmulatorJS loader -->
  <script src="https://cdn.emulatorjs.org/latest/data/loader.js"></script>

  <!-- Your logic -->
  <script src="emulator.js"></script>

</body>
</html>
