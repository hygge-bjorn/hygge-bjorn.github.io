<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Emulator</title>

<style>
html,body{
margin:0;
background:black;
height:100%;
overflow:hidden;
font-family:sans-serif;
}

#game{
width:100vw;
height:100dvh;
background:black;
}

#menu{
position:fixed;
top:10px;
left:10px;
z-index:999;
display:flex;
gap:5px;
opacity:.2;
transition:.2s;
}

#menu:hover{
opacity:1;
}

button{
border:none;
padding:8px;
background:#222;
color:white;
border-radius:8px;
font-size:14px;
}

#rom,#sav{
display:none;
}
</style>
</head>

<body>

<div id="menu">

<button onclick="rom.click()">
ROM
</button>

<button onclick="sav.click()">
SAV
</button>

<button onclick="downloadSav()">
↓SAV
</button>

<button onclick="fullscreen()">
FULL
</button>

</div>

<input
id="rom"
type="file"
accept=".gb,.gbc,.gba,.smc,.sfc"
>

<input
id="sav"
type="file"
accept=".sav,.srm"
>

<div id="game"></div>

<script src="emulator.js"></script>

</body>
</html>
